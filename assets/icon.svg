<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4b56a"/>
      <stop offset="1" stop-color="#8a6a2e"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed gold so the icon looks correct when masked (maskable safe zone). -->
  <rect width="512" height="512" fill="url(#gold)"/>
  <text x="256" y="256"
        font-family="'Syne', 'Segoe UI', Arial, sans-serif"
        font-size="230" font-weight="800"
        letter-spacing="8"
        text-anchor="middle" dominant-baseline="central"
        fill="#1a1408">GO</text>
</svg>
