[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Optional: attach a Railway Volume mounted at /app/data so data/signals.db
# survives redeploys. Without a volume, the live SQLite DB resets each deploy.
