[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Live alerts (Gold/Silver/Bitcoin) when web is closed:
# Set Railway Variables:
#   TELEGRAM_BOT_TOKEN=...
#   TELEGRAM_CHAT_ID=...
#   ENABLE_ALERT_WORKER=1
# prodServer auto-starts the alert worker and pushes Telegram notifications.
#
# Intra30: auto-starts on Railway (same as QS Pro). Set ENABLE_INTRA30_WORKER=0
# to force OFF. Best pack gates remain (strict M5 + H1/Daily forming + no chase).
# (Default in code: auto/ON on Railway — was OFF and starved live locks.)
#
# IMPORTANT: Railway Volume MUST be mounted at /app/data
# (created as scalping-volume) so signals.db + push-subscriptions survive redeploys.
# Without it, every deploy wipes locks and the UI jumps back to WAITING.
#
# Closed-app phone alerts also need:
#   WEB_PUSH_VAPID_PUBLIC_KEY=...
#   WEB_PUSH_VAPID_PRIVATE_KEY=...
# (npm run gen-vapid) — then open the PWA and tap "Enable Push" once.
